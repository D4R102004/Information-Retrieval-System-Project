services:

  # Runs the web crawler and saves documents to data/raw/
  crawler:
    build: .
    command: python -m sri.crawler --max-articles 500
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app/src

  # Runs the full integration demo (index + search + evaluate)
  demo:
    build: .
    command: python src/main.py
    volumes:
      - ./data:/app/data
    environment:
      - PYTHONPATH=/app/src

